# Circuit Label Registry
# ──────────────────────────────────────────────────────────────────────────────
# Maps hardware circuit_id (as reported by the power monitoring sensor) to
# human-readable metadata used in alarm announcements and the UI.
#
# circuit_id    Must match exactly what the power sensor publishes in
#               reading.circuit_id (typically the device/sensor ID string).
# name          Short human-readable circuit name.
#               Used in TTS: "Alexa Announce {name} breaker has been tripped"
#               and in the alarm dashboard.
# location      Room or area. Used for grouping in the UI.
# panel         Electrical panel this circuit belongs to.
#               "main" for the main panel, "sub" for sub-panels.
# amps          Circuit breaker amperage (for overcurrent threshold context).
# ──────────────────────────────────────────────────────────────────────────────

circuits:

